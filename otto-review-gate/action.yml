name: Otto Review Gate
description: "Enforces the Otto review gate security control — Otto-authored PRs require at least 2 independent approvals before merge."

inputs:
  pr_number:
    description: "The pull request number to check"
    required: true
  head_sha:
    description: "The head SHA of the pull request"
    required: true

runs:
  using: composite
  steps:
    - name: Check Otto PR self-review
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ inputs.pr_number }}
        HEAD_SHA: ${{ inputs.head_sha }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
        echo "PR author: $PR_AUTHOR"

        if [[ "$PR_AUTHOR" != "app/agentotto" ]]; then
          echo "Not an Otto PR — gate not applicable."
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=success -f context="otto/review-gate" \
            -f description="Not an Otto PR."
          exit 0
        fi

        APPROVAL_COUNT=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
          --jq '[.[] | select(.state == "APPROVED")] | length')
        echo "Approval count: $APPROVAL_COUNT"

        if [[ "$APPROVAL_COUNT" -ge 2 ]]; then
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=success -f context="otto/review-gate" \
            -f description="Gate passed — 2 approvals present."
        else
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=failure -f context="otto/review-gate" \
            -f description="Otto PRs require 2 approvals (${APPROVAL_COUNT}/2 present)."
        fi
